      { q: "请大家站( )，我们现在上课。", options: ["起来", "出来", "回来", "进去"], ans: 0 },
      { q: "他走( )教室去。", options: ["进", "出", "回", "上"], ans: 0 },
      { q: "爸爸从国外带回一些礼物( )。", options: ["来", "去", "上", "进"], ans: 0 },
      { q: "外面下雨了，快跑( )来吧。", options: ["进", "出", "回", "上"], ans: 0 }
    ];

    const fillBlanksData = [
      {
        group: ["一般", "经常", "终于", "应该", "愿意"],
        sentences: [
          { text: ["你们 ", " 在哪儿吃饭？在家吃还是出去吃？"], ans: "一般" },
          { text: ["", " 考完试了，我们去哪儿玩儿玩儿？"], ans: "终于" },
          { text: ["你 ", " 早睡早起，别睡得那么晚。"], ans: "应该" },
          { text: ["我不 ", " 去那个公司工作，太远，也太累。"], ans: "愿意" },
          { text: ["那个饭馆离我们学校很近，我们 ", " 去。"], ans: "经常" }
        ]
      },
      {
        group: ["过去", "起来", "遇到", "校长", "礼物"],
        sentences: [
          { text: ["A: 一会儿周经理走进来的时候，请大家站 ", " 。\nB: 好，我们知道了。"], ans: "起来" },
          { text: ["A: 我忘了把这本书还给他了。\nB: 没关系，明天我帮你送 ", " 吧。"], ans: "过去" },
          { text: ["A: 前边那位老人是谁？\nB: 他是我们的 ", " 。"], ans: "校长" },
          { text: ["A: 你怎么回来这么晚？\nB: 回家的路上 ", " 张老师了，跟他聊了一会儿。"], ans: "遇到" },
          { text: ["A: 下个月是爷爷的生日，你有什么打算？\nB: 我要送他一件特别的 ", " 。"], ans: "礼物" }
        ]
      }
    ];

    // --- UTILS ---
    const speakText = (text) => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        window.speechSynthesis.speak(utterance);
      } else {
        alert("Kechirasiz, sizning brauzeringiz ovozli o'qishni qo'llab-quvvatlamaydi.");
      }
    };

    // --- COMPONENTS ---

    const Flashcards = () => {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);

      const nextCard = () => {
        setIsFlipped(false);
        setTimeout(() => setCurrentIndex((prev) => (prev + 1) % vocabList.length), 150);
      };

      const prevCard = () => {
        setIsFlipped(false);
        setTimeout(() => setCurrentIndex((prev) => (prev - 1 + vocabList.length) % vocabList.length), 150);
      };

      const card = vocabList[currentIndex];

      return (
        <div className="flex flex-col items-center justify-center p-6 min-h-[60vh]">
          <div className="text-sm font-semibold text-gray-500 mb-4 tracking-widest uppercase">
            {currentIndex + 1} / {vocabList.length}
          </div>
          
          <div 
            className="relative w-80 h-96 sm:w-96 perspective-1000 cursor-pointer"
            onClick={() => setIsFlipped(!isFlipped)}
          >
            <div className={`w-full h-full duration-500 preserve-3d relative ${isFlipped ? 'rotate-y-180' : ''}`}>
              
              {/* Front */}
              <div className="absolute w-full h-full bg-white rounded-2xl shadow-xl flex flex-col items-center justify-center backface-hidden border-t-8 border-teal-500">
                <h2 className="text-7xl sm:text-8xl font-bold text-gray-800">{card.cn}</h2>
              </div>

              {/* Back */}
              <div className="absolute w-full h-full bg-teal-50 rounded-2xl shadow-xl flex flex-col items-center justify-center backface-hidden rotate-y-180 border-t-8 border-teal-600 p-6 text-center space-y-4">
                <h2 className="text-5xl font-semibold text-teal-600">{card.pinyin}</h2>
                <div className="w-full h-px bg-teal-200 my-2"></div>
                <p className="text-2xl font-bold text-gray-800">{card.uz}</p>
                <p className="text-lg text-gray-600">{card.ru}</p>
                <p className="text-lg text-gray-500 italic">{card.en}</p>
              </div>

            </div>
          </div>

          <div className="flex items-center space-x-6 mt-10">
            <button onClick={prevCard} className="p-3 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-700 transition">
              <ChevronLeft size={28} />
            </button>
            <button 
              onClick={(e) => { e.stopPropagation(); speakText(card.cn); }} 
              className="p-4 rounded-full bg-teal-500 hover:bg-teal-600 text-white shadow-lg transition"
            >
              <Volume2 size={32} />
            </button>
            <button onClick={nextCard} className="p-3 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-700 transition">
              <ChevronRight size={28} />
            </button>
          </div>
        </div>
      );
    };

    const QuizComponent = ({ data, isUzbekUI }) => {
      const [currentQ, setCurrentQ] = useState(0);
      const [score, setScore] = useState(0);
      const [showResult, setShowResult] = useState(false);
      const [selectedOpt, setSelectedOpt] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);

      const handleOptionClick = (index) => {
        if (isAnswered) return;
        setSelectedOpt(index);
        setIsAnswered(true);
        if (index === data[currentQ].ans) {
          setScore(score + 1);
        }
      };

      const nextQuestion = () => {
        if (currentQ < data.length - 1) {
          setCurrentQ(currentQ + 1);
          setSelectedOpt(null);
          setIsAnswered(false);
        } else {
          setShowResult(true);
        }
      };

      const resetQuiz = () => {
        setCurrentQ(0);
        setScore(0);
        setShowResult(false);
        setSelectedOpt(null);
        setIsAnswered(false);
      };

      if (showResult) {
        return (
          <div className="flex flex-col items-center justify-center p-10 bg-white rounded-xl shadow-sm text-center">
            <h2 className="text-3xl font-bold text-gray-800 mb-4">{isUzbekUI ? "Test Yakunlandi!" : "测试结束！"}</h2>
            <p className="text-xl mb-6">{isUzbekUI ? "Sizning natijangiz:" : "你的成绩："}</p>
            <div className="text-6xl font-black text-teal-500 mb-8">{score} / {data.length}</div>
            <button onClick={resetQuiz} className="flex items-center px-6 py-3 bg-teal-500 text-white rounded-lg hover:bg-teal-600 font-medium">
              <RefreshCw className="mr-2" /> {isUzbekUI ? "Qaytadan urinish" : "再来一次"}
            </button>
          </div>
        );
      }

      const qData = data[currentQ];

      return (
        <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-sm p-6 sm:p-10 border border-gray-100">
          <div className="flex justify-between items-center mb-8">
            <span className="text-gray-500 font-medium">{isUzbekUI ? "Savol:" : "题："} {currentQ + 1} / {data.length}</span>
            <span className="text-teal-500 font-bold">{isUzbekUI ? "Natija:" : "得分："} {score}</span>
          </div>
          
          <div className="mb-10 text-center">
            <h3 className="text-5xl font-bold text-gray-800">{qData.q}</h3>
          </div>

          <div className="space-y-3">
            {qData.options.map((opt, idx) => {
              let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 text-lg ";
              if (!isAnswered) {
                btnClass += "border-gray-200 hover:border-teal-400 hover:bg-teal-50 text-gray-700";
              } else {
                if (idx === qData.ans) {
                  btnClass += "border-green-500 bg-green-50 text-green-700";
                } else if (idx === selectedOpt) {
                  btnClass += "border-red-500 bg-red-50 text-red-700";
                } else {
                  btnClass += "border-gray-200 text-gray-400";
                }
              }

              return (
                <button 
                  key={idx} 
                  onClick={() => handleOptionClick(idx)}
                  className={btnClass}
                  disabled={isAnswered}
                >
                  <div className="flex justify-between items-center">
                    <span>{opt}</span>
                    {isAnswered && idx === qData.ans && <CheckCircle className="text-green-500" />}
                    {isAnswered && idx === selectedOpt && idx !== qData.ans && <XCircle className="text-red-500" />}
                  </div>
                </button>
              );
            })}
          </div>

          {isAnswered && (
            <div className="mt-8 flex justify-end">
              <button 
                onClick={nextQuestion}
                className="flex items-center px-6 py-3 bg-teal-500 text-white rounded-lg hover:bg-teal-600 font-medium"
              >
                {isUzbekUI ? "Keyingisi" : "下一题"} <ChevronRight className="ml-1" />
              </button>
            </div>
          )}
        </div>
      );
    };

    const Dialogues = () => {
      return (
        <div className="max-w-4xl mx-auto space-y-8">
          {dialogues.map((dialogue, idx) => (
            <div key={idx} className="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
              <div className="bg-teal-50 px-6 py-4 border-b border-teal-100 flex justify-between items-center">
                <h3 className="text-xl font-bold text-teal-800">{dialogue.title}</h3>
              </div>
              <div className="divide-y divide-gray-100">
                {dialogue.lines.map((line, lIdx) => (
                  <div key={lIdx} className="p-6 flex items-start gap-4 hover:bg-gray-50 transition">
                    <button 
                      onClick={() => speakText(line.cn)} 
                      className="flex-shrink-0 p-2 rounded-full bg-teal-100 text-teal-600 hover:bg-teal-500 hover:text-white transition mt-1"
                    >
                      <Volume2 size={20} />
                    </button>
                    <div className="space-y-2 w-full">
                      <p className="text-xl font-bold text-gray-800">{line.cn}</p>
                      <p className="text-sm text-teal-600 font-medium">{line.pinyin}</p>
                      <p className="text-sm text-gray-700"><span className="font-semibold text-blue-600">UZ: </span>{line.uz}</p>
                      <p className="text-sm text-gray-700"><span className="font-semibold text-green-600">RU: </span>{line.ru}</p>
                      <p className="text-sm text-gray-700"><span className="font-semibold text-purple-600">EN: </span>{line.en}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    };

    const GrammarDocs = () => {
      return (
        <div className="max-w-4xl mx-auto space-y-8">
          {grammarData.map((item, idx) => (
            <div key={idx} className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="bg-blue-50 px-6 py-4 border-b border-blue-100">
                <h3 className="text-xl font-bold text-blue-800">{item.title}</h3>
              </div>
              <div className="p-6 space-y-6">
                <div className="space-y-4">
                  {item.points.map((pt, pIdx) => (
                    <div key={pIdx} className="bg-gray-50 p-4 rounded-lg border-l-4 border-blue-400">
                      <p className="font-bold text-gray-800 mb-2">{pt.cn}</p>
                      <p className="text-sm text-gray-700 mb-1"><span className="font-semibold text-blue-600">UZ: </span>{pt.uz}</p>
                      <p className="text-sm text-gray-700 mb-1"><span className="font-semibold text-green-600">RU: </span>{pt.ru}</p>
                      <p className="text-sm text-gray-700"><span className="font-semibold text-purple-600">EN: </span>{pt.en}</p>
                    </div>
                  ))}
                </div>
                
                <div className="mt-6">
                  <h4 className="font-bold text-gray-800 mb-3 flex items-center">
                    <FileText className="mr-2 text-blue-500" size={18} /> 例如 (Misollar / Примеры / Examples):
                  </h4>
                  <ul className="space-y-2">
                    {item.examples.map((ex, eIdx) => (
                      <li key={eIdx} className="flex flex-col sm:flex-row sm:items-center py-2 border-b border-gray-100 last:border-0 gap-2">
                        <span className="text-lg font-medium text-gray-800">{ex.cn}</span>
                        <span className="text-sm text-gray-500 italic sm:ml-auto">{ex.uz}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    };

    const FillBlanks = () => {
      const [answers1, setAnswers1] = useState({});
      const [answers2, setAnswers2] = useState({});
      const [showRes1, setShowRes1] = useState(false);
      const [showRes2, setShowRes2] = useState(false);

      const handleSelect = (part, qIndex, word) => {
        if(part === 1) {
          setAnswers1({...answers1, [qIndex]: word});
        } else {
          setAnswers2({...answers2, [qIndex]: word});
        }
      }

      const renderPart = (dataPart, answers, setAnswers, showRes, setShowRes, partNum) => {
        return (
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-8">
            <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Qism {partNum} / Часть {partNum}</h3>
            
            <div className="flex flex-wrap gap-3 mb-8">
              {dataPart.group.map(word => (
                <span key={word} className="px-4 py-2 bg-yellow-100 text-yellow-800 font-bold rounded-lg border border-yellow-200">
                  {word}
                </span>
              ))}
            </div>

            <div className="space-y-6">
              {dataPart.sentences.map((sen, idx) => {
                const isCorrect = answers[idx] === sen.ans;
                return (
                  <div key={idx} className="flex flex-col space-y-2">
                    <div className="text-lg text-gray-800 whitespace-pre-wrap flex items-center flex-wrap">
                      {sen.text[0]}
                      <select 
                        value={answers[idx] || ""} 
                        onChange={(e) => handleSelect(partNum, idx, e.target.value)}
                        className={`mx-2 p-1 border-b-2 outline-none font-bold text-center appearance-none cursor-pointer ${
                          showRes 
                            ? (isCorrect ? "border-green-500 text-green-600 bg-green-50" : "border-red-500 text-red-600 bg-red-50") 
                            : "border-gray-400 bg-gray-50 text-blue-600"
                        }`}
                      >
                        <option value="" disabled>___</option>
                        {dataPart.group.map(w => <option key={w} value={w}>{w}</option>)}
                      </select>
                      {sen.text[1]}
                      
                      {showRes && isCorrect && <CheckCircle className="text-green-500 ml-2" size={20}/>}
                      {showRes && !isCorrect && <XCircle className="text-red-500 ml-2" size={20}/>}
                    </div>
                  </div>
                )
              })}
            </div>

            <div className="mt-8">
              <button 
                onClick={() => setShowRes(true)}
                className="px-6 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 font-medium"
              >
                Tekshirish (Проверить / Check)
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-4xl mx-auto">
          {renderPart(fillBlanksData[0], answers1, setAnswers1, showRes1, setShowRes1, 1)}
          {renderPart(fillBlanksData[1], answers2, setAnswers2, showRes2, setShowRes2, 2)}
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('flashcards');

      const tabs = [
        { id: 'flashcards', label: '生词闪卡', icon: <BookOpen size={18} /> },
        { id: 'vocabTest', label: '生词测试', icon: <CheckSquare size={18} /> },
        { id: 'dialogues', label: '对话内容', icon: <MessageCircle size={18} /> },
        { id: 'grammar', label: '语法解释', icon: <FileText size={18} /> },
        { id: 'grammarTest', label: '语法测试', icon: <CheckSquare size={18} /> },
        { id: 'exercises', label: '练习', icon: <Edit3 size={18} /> },
      ];

      return (
        <div className="min-h-screen flex flex-col">
          
          {/* Header */}
          <header className="bg-teal-600 text-white shadow-md pt-8 pb-6 px-4">
            <div className="max-w-6xl mx-auto text-center space-y-2">
              <h1 className="text-3xl sm:text-4xl font-black tracking-wide">HSK 3 - 第13课 (Lesson 13)</h1>
              <h2 className="text-lg sm:text-xl font-medium text-teal-100">
                Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
              </h2>
            </div>
          </header>

          {/* Navigation */}
          <div className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10">
            <div className="max-w-6xl mx-auto overflow-x-auto custom-scrollbar">
              <div className="flex justify-start sm:justify-center p-2 min-w-max">
                {tabs.map((tab) => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex items-center gap-2 px-4 py-3 mx-1 rounded-lg font-medium transition-colors ${
                      activeTab === tab.id 
                        ? 'bg-teal-50 text-teal-600' 
                        : 'text-gray-600 hover:bg-gray-100'
                    }`}
                  >
                    {tab.icon}
                    {tab.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Main Content Area */}
          <main className="flex-grow p-4 sm:p-8">
            {activeTab === 'flashcards' && <Flashcards />}
            {activeTab === 'vocabTest' && <QuizComponent data={vocabQuizData} isUzbekUI={true} />}
            {activeTab === 'dialogues' && <Dialogues />}
            {activeTab === 'grammar' && <GrammarDocs />}
            {activeTab === 'grammarTest' && <QuizComponent data={grammarQuizData} isUzbekUI={false} />}
            {activeTab === 'exercises' && <FillBlanks />}
          </main>

          {/* Footer */}
          <footer className="bg-gray-800 text-gray-300 py-8 px-4 mt-auto text-center border-t-4 border-teal-500">
            <p className="font-medium">HSK 3 Standard Course - Lesson 13</p>
            <p className="text-sm mt-2 opacity-80">© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
          </footer>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
